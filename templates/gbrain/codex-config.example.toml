# Add this minimal plugin layout to ~/.codex/config.toml after running:
#   ./bootstrap/install/gbrain.sh
#
# Use an absolute path. MCP servers do not always inherit your interactive shell PATH.
# Keep plugins disabled globally. Use zsh functions to enable task plugins per new session:
#   cx        -> codex
#   cxweb     -> codex with build-web-apps + browser-use
#   cxppt     -> codex with presentations
#   cxdesign  -> codex with figma
#   cxmac     -> codex with build-macos-apps + build-ios-apps
#   cxg       -> codex with the gbrain MCP server injected on demand

#
# Do not set `profile = "minimal"` unless a matching `[profiles.minimal]` table
# exists. Disabling plugins at the top level is already the minimal default.

[plugins."github@openai-curated"]
enabled = false

[plugins."figma@openai-curated"]
enabled = false

[plugins."build-web-apps@openai-curated"]
enabled = false

[plugins."superpowers@openai-curated"]
enabled = false

[plugins."computer-use@openai-bundled"]
enabled = false

[plugins."build-macos-apps@openai-curated"]
enabled = false

[plugins."build-ios-apps@openai-curated"]
enabled = false

[plugins."browser-use@openai-bundled"]
enabled = false

[plugins."spreadsheets@openai-primary-runtime"]
enabled = false

[plugins."presentations@openai-primary-runtime"]
enabled = false

[plugins."documents@openai-primary-runtime"]
enabled = false

# Keep GBrain MCP out of the default config for faster Codex startup.
# Use the tracked zsh function `cxg` when a session needs the knowledge brain.
# Equivalent one-off override:
#   codex \
#     -c 'mcp_servers.gbrain.command="/Users/YOUR_USERNAME/.local/bin/gbrain"' \
#     -c 'mcp_servers.gbrain.args=["serve"]' \
#     -c 'mcp_servers.gbrain.enabled_tools=["search","get","query"]'
